<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1877f2" />
      <stop offset="100%" style="stop-color:#0a3d91" />
    </linearGradient>
  </defs>
  <rect width="800" height="180" rx="12" fill="url(#bg)" />
  <!-- Icon: chat bubble -->
  <g transform="translate(60, 48)">
    <rect x="0" y="0" width="80" height="60" rx="12" fill="rgba(255,255,255,0.15)" />
    <polygon points="20,60 30,80 40,60" fill="rgba(255,255,255,0.15)" />
    <line x1="16" y1="22" x2="64" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round" />
    <line x1="16" y1="34" x2="56" y2="34" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round" />
    <line x1="16" y1="46" x2="44" y2="46" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round" />
  </g>
  <!-- Title -->
  <text x="170" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="white">
    FB Comment Scraper
  </text>
  <!-- Subtitle -->
  <text x="170" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)">
    Chrome Extension  ·  Scrape Facebook Comments  ·  Export to CSV
  </text>
  <!-- Version badge -->
  <rect x="170" y="128" width="90" height="24" rx="12" fill="rgba(255,255,255,0.15)" />
  <text x="215" y="145" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.9)">
    Manifest V3
  </text>
  <rect x="270" y="128" width="70" height="24" rx="12" fill="rgba(255,255,255,0.15)" />
  <text x="305" y="145" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.9)">
    Vanilla JS
  </text>
</svg>
