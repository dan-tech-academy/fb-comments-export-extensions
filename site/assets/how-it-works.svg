<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .box { fill: url(#boxGrad); stroke: #30363d; stroke-width: 1.5; }
    .label { fill: #e6edf3; font-size: 15px; font-weight: 700; }
    .sublabel { fill: #8b949e; font-size: 12px; }
    .arrow { fill: none; stroke: #4da3ff; stroke-width: 2; marker-end: url(#arrowhead); }
    .step-num { fill: #4da3ff; font-size: 11px; font-weight: 800; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4da3ff"/>
    </marker>
  </defs>

  <!-- Step 1: Popup Start -->
  <rect class="box" x="20" y="60" width="130" height="70" rx="10"/>
  <text class="step-num" x="34" y="52">1</text>
  <text class="label" x="85" y="93" text-anchor="middle">Popup</text>
  <text class="sublabel" x="85" y="112" text-anchor="middle">Start</text>

  <!-- Arrow 1→2 -->
  <line class="arrow" x1="150" y1="95" x2="185" y2="95"/>

  <!-- Step 2: Auto-Scroll -->
  <rect class="box" x="190" y="60" width="130" height="70" rx="10"/>
  <text class="step-num" x="204" y="52">2</text>
  <text class="label" x="255" y="93" text-anchor="middle">Auto-Scroll</text>
  <text class="sublabel" x="255" y="112" text-anchor="middle">Load All</text>

  <!-- Arrow 2→3 -->
  <line class="arrow" x1="320" y1="95" x2="355" y2="95"/>

  <!-- Step 3: Expand Threads -->
  <rect class="box" x="360" y="60" width="130" height="70" rx="10"/>
  <text class="step-num" x="374" y="52">3</text>
  <text class="label" x="425" y="93" text-anchor="middle">Expand</text>
  <text class="sublabel" x="425" y="112" text-anchor="middle">Threads</text>

  <!-- Arrow 3→4 -->
  <line class="arrow" x1="490" y1="95" x2="525" y2="95"/>

  <!-- Step 4: Parse Comments -->
  <rect class="box" x="530" y="60" width="130" height="70" rx="10"/>
  <text class="step-num" x="544" y="52">4</text>
  <text class="label" x="595" y="93" text-anchor="middle">Parse</text>
  <text class="sublabel" x="595" y="112" text-anchor="middle">Comments</text>

  <!-- Arrow 4→5 (down) -->
  <line class="arrow" x1="595" y1="130" x2="595" y2="165"/>

  <!-- Step 5: Download CSV -->
  <rect class="box" x="530" y="170" width="130" height="70" rx="10"/>
  <text class="step-num" x="544" y="162">5</text>
  <text class="label" x="595" y="203" text-anchor="middle">Download</text>
  <text class="sublabel" x="595" y="222" text-anchor="middle">CSV</text>
</svg>
