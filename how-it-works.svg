<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1877f2"/>
      <stop offset="100%" style="stop-color:#0a3d91"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.7)"/>
    </marker>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>

  <rect width="800" height="220" rx="12" fill="url(#bg)"/>

  <!-- Step 1: Popup Start -->
  <rect x="30" y="55" width="120" height="64" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="90" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Popup</text>
  <text x="90" y="104" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.65)">Start</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="87" x2="182" y2="87" stroke="rgba(255,255,255,0.7)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Auto-Scroll -->
  <rect x="190" y="55" width="120" height="64" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="250" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Auto-Scroll</text>
  <text x="250" y="104" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.65)">Load All</text>

  <!-- Arrow 2→3 -->
  <line x1="310" y1="87" x2="342" y2="87" stroke="rgba(255,255,255,0.7)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Expand -->
  <rect x="350" y="55" width="120" height="64" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="410" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Expand</text>
  <text x="410" y="104" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.65)">Threads</text>

  <!-- Arrow 3→4 -->
  <line x1="470" y1="87" x2="502" y2="87" stroke="rgba(255,255,255,0.7)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Parse -->
  <rect x="510" y="55" width="120" height="64" rx="10" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="570" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Parse</text>
  <text x="570" y="104" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.65)">Comments</text>

  <!-- Arrow 4→5 (down) -->
  <line x1="570" y1="119" x2="570" y2="142" stroke="rgba(255,255,255,0.7)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Download CSV -->
  <rect x="510" y="150" width="120" height="50" rx="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="570" y="181" text-anchor="middle" font-size="15" font-weight="700" fill="white">Download CSV</text>
</svg>
